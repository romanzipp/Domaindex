{{define "title"}}Add Registrar{{end}}
{{define "content"}}
<div class="max-w-lg">
    <div class="flex items-center gap-3 mb-6">
        <a href="/registrars" class="text-sm text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-gray-100">← Registrars</a>
        <h1 class="text-xl font-semibold">Add registrar</h1>
    </div>

    <form method="POST" action="/registrars" class="space-y-4">
        <div>
            <label class="block text-sm font-medium mb-1" for="name">Name</label>
            <input type="text" id="name" name="name" required autofocus placeholder="Namecheap"
                class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-gray-500 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-100 dark:focus:border-gray-400">
        </div>
        <div class="grid grid-cols-3 gap-3">
            <div>
                <label class="block text-sm font-medium mb-1" for="url">URL</label>
                <input type="url" id="url" name="url" placeholder="https://namecheap.com"
                    class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-gray-500 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-100 dark:focus:border-gray-400">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1" for="iana_id">IANA ID</label>
                <input type="text" id="iana_id" name="iana_id" placeholder="1234"
                    class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-gray-500 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-100 dark:focus:border-gray-400">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1" for="currency">Currency</label>
                <input type="text" id="currency" name="currency" value="USD" maxlength="3" placeholder="USD"
                    class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-gray-500 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-100 dark:focus:border-gray-400">
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium mb-1" for="notes">Notes</label>
            <textarea id="notes" name="notes" rows="3"
                class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-gray-500 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-100 dark:focus:border-gray-400"></textarea>
        </div>
        <div class="flex gap-2 pt-2">
            <button type="submit" class="bg-gray-900 text-white text-sm px-4 py-2 rounded hover:bg-gray-700 dark:bg-white dark:text-gray-900 dark:hover:bg-gray-200">Add registrar</button>
            <a href="/registrars" class="border border-gray-300 text-sm px-4 py-2 rounded hover:bg-gray-100 dark:border-gray-600 dark:hover:bg-gray-800">Cancel</a>
        </div>
    </form>
</div>
{{end}}
