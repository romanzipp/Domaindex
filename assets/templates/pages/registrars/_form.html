{{define "registrars/_form.html"}}
<details class="card mt-4">
    <summary class="text-sm font-medium cursor-pointer hover:text-gray-700 select-none dark:hover:text-gray-300">+ Create new registrar</summary>
    <form method="POST" action="/registrars" class="mt-4 space-y-3">
        {{if .Next}}<input type="hidden" name="next" value="{{.Next}}">{{end}}
        <div>
            <label class="block text-sm font-medium mb-1">Name <span class="text-red-500">*</span></label>
            <input type="text" name="name" required placeholder="Namecheap" class="input w-full">
        </div>
        <div class="grid grid-cols-3 gap-3">
            <div>
                <label class="block text-sm font-medium mb-1">URL</label>
                <input type="url" name="url" placeholder="https://namecheap.com" class="input w-full">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">IANA ID</label>
                <input type="text" name="iana_id" placeholder="1234" class="input w-full">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Currency</label>
                <input type="text" name="currency" value="USD" maxlength="3" class="input w-full">
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">Notes</label>
            <textarea name="notes" rows="2" class="input w-full"></textarea>
        </div>
        <button type="submit" class="btn-primary px-4 py-1.5">Create registrar</button>
    </form>
</details>
{{end}}
