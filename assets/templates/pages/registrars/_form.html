{{define "registrars/_form.html"}}
<details class="border border-gray-200 rounded p-4 mt-4">
    <summary class="text-sm font-medium cursor-pointer hover:text-gray-700 select-none">+ Create new registrar</summary>
    <form method="POST" action="/registrars" class="mt-4 space-y-3">
        {{if .Next}}<input type="hidden" name="next" value="{{.Next}}">{{end}}
        <div>
            <label class="block text-sm font-medium mb-1">Name <span class="text-red-500">*</span></label>
            <input type="text" name="name" required placeholder="Namecheap"
                class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-gray-500">
        </div>
        <div class="grid grid-cols-3 gap-3">
            <div>
                <label class="block text-sm font-medium mb-1">URL</label>
                <input type="url" name="url" placeholder="https://namecheap.com"
                    class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-gray-500">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">IANA ID</label>
                <input type="text" name="iana_id" placeholder="1234"
                    class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-gray-500">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Currency</label>
                <input type="text" name="currency" value="USD" maxlength="3"
                    class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-gray-500">
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">Notes</label>
            <textarea name="notes" rows="2"
                class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-gray-500"></textarea>
        </div>
        <button type="submit" class="bg-gray-900 text-white text-sm px-4 py-1.5 rounded hover:bg-gray-700">
            Create registrar
        </button>
    </form>
</details>
{{end}}
