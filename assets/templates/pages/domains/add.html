{{define "title"}}Add Domain — Domain Manager{{end}}
{{define "content"}}
<div class="max-w-lg">
    <div class="flex items-center gap-3 mb-6">
        <a href="/domains" class="text-sm text-gray-500 hover:text-gray-900">← Domains</a>
        <h1 class="text-xl font-semibold">Add domain</h1>
    </div>

    <form method="POST" action="/domains" class="space-y-4">
        <div>
            <label class="block text-sm font-medium mb-1" for="name">Domain name</label>
            <input type="text" id="name" name="name" placeholder="example.com" required autofocus
                class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-gray-500">
        </div>

        <div>
            <label class="block text-sm font-medium mb-1" for="registrar_id">Registrar</label>
            <select id="registrar_id" name="registrar_id"
                class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-gray-500">
                <option value="0">— None —</option>
                {{range .Data.Registrars}}
                <option value="{{.ID}}">{{.Name}}</option>
                {{end}}
            </select>
        </div>

        <div class="flex gap-6">
            <label class="flex items-center gap-2 text-sm">
                <input type="checkbox" name="auto_renewed" class="rounded">
                Auto-renewed
            </label>
            <label class="flex items-center gap-2 text-sm">
                <input type="checkbox" name="wishlisted" class="rounded">
                Wishlisted
            </label>
        </div>

        <p class="text-xs text-gray-500">WHOIS information will be fetched automatically.</p>

        <div class="flex gap-2 pt-2">
            <button type="submit"
                class="bg-gray-900 text-white text-sm px-4 py-2 rounded hover:bg-gray-700">
                Add domain
            </button>
            <a href="/domains" class="border border-gray-300 text-sm px-4 py-2 rounded hover:bg-gray-100">Cancel</a>
        </div>
    </form>
</div>
{{end}}
