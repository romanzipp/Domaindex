{{define "title"}}Add Domain{{end}}
{{define "content"}}
<div class="max-w-lg">
    <div class="flex items-center gap-3 mb-6">
        <a href="/domains" class="text-sm text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-gray-100">← Domains</a>
        <h1 class="text-xl font-semibold">Add domain</h1>
    </div>

    <form method="POST" action="/domains" class="space-y-4">
        <div>
            <label class="block text-sm font-medium mb-1" for="name">Domain name</label>
            <input type="text" id="name" name="name" placeholder="example.com" required autofocus
                class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-gray-500 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-100 dark:focus:border-gray-400">
        </div>

        <div>
            <label class="block text-sm font-medium mb-1" for="registrar_id">Registrar</label>
            <select id="registrar_id" name="registrar_id"
                class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-gray-500 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-100 dark:focus:border-gray-400">
                <option value="0">— None —</option>
                <option value="whois">— Auto-create from WHOIS —</option>
                {{range .Data.Registrars}}
                <option value="{{.ID}}">{{.Name}}</option>
                {{end}}
            </select>
            {{template "registrars/_fields.html" .}}
        </div>

        <div class="flex gap-6">
            <label class="flex items-center gap-2 text-sm">
                <input type="checkbox" name="auto_renewed" checked class="rounded">
                Auto-renewed
            </label>
            <label class="flex items-center gap-2 text-sm">
                <input type="checkbox" name="wishlisted" class="rounded">
                Wishlisted
            </label>
        </div>

        <p class="text-xs text-gray-500 dark:text-gray-400">WHOIS information will be fetched automatically.</p>

        <div class="flex gap-2 pt-2">
            <button type="submit" class="bg-gray-900 text-white text-sm px-4 py-2 rounded hover:bg-gray-700 dark:bg-white dark:text-gray-900 dark:hover:bg-gray-200">
                Add domain
            </button>
            <a href="/domains" class="border border-gray-300 text-sm px-4 py-2 rounded hover:bg-gray-100 dark:border-gray-600 dark:hover:bg-gray-800">Cancel</a>
        </div>
    </form>
</div>
{{end}}
