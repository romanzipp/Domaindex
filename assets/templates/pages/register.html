{{define "title"}}Register{{end}}
{{define "content"}}
<div class="max-w-sm mx-auto mt-16">
    <h1 class="text-2xl font-semibold mb-6">Create account</h1>
    <form method="POST" action="/register" class="space-y-4">
        <div>
            <label class="block text-sm font-medium mb-1" for="username">Username</label>
            <input type="text" id="username" name="username" required autofocus class="input w-full">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1" for="email">Email</label>
            <input type="email" id="email" name="email" required class="input w-full">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1" for="password">Password</label>
            <input type="password" id="password" name="password" required class="input w-full">
        </div>
        <button type="submit" class="btn-primary w-full px-3 py-2">Create account</button>
    </form>
    <p class="text-sm text-gray-500 mt-4 text-center dark:text-gray-400">
        Already have an account? <a href="/login" class="text-gray-900 underline dark:text-gray-100">Sign in</a>
    </p>
</div>
{{end}}
