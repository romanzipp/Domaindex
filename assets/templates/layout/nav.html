{{define "nav.html"}}
<nav class="bg-white border-b border-gray-200 mb-6 dark:bg-gray-900 dark:border-gray-700">
    <div class="max-w-7xl mx-auto px-4">
        <div class="flex items-center justify-between h-12">
            <div class="flex items-center gap-6">
                <a href="/" class="font-semibold text-gray-900 dark:text-gray-100">{{.AppName}}</a>
                <div class="hidden md:flex items-center gap-6">
                    <a href="/domains" class="nav-link">Domains</a>
                    <a href="/registrars" class="nav-link">Registrars</a>
                    <a href="/notifications" class="nav-link">
                        Notifications{{if .UnreadCount}} <span class="inline-block bg-red-500 text-white text-xs rounded-full px-1.5 py-0.5 leading-none ml-0.5">{{.UnreadCount}}</span>{{end}}
                    </a>
                </div>
            </div>
            <div class="hidden md:flex items-center gap-4">
                <a href="/profile" class="nav-link">{{.User.Username}}</a>
                <form method="POST" action="/logout">
                    <button type="submit" class="nav-link">Logout</button>
                </form>
            </div>
            <a href="#nav-menu" class="md:hidden nav-link text-xl leading-none px-1">&#9776;</a>
        </div>
    </div>
</nav>

<div id="nav-menu" class="nav-drawer fixed inset-0 z-50 md:hidden">
    <a href="#" class="absolute inset-0 bg-black/40" aria-label="Close menu"></a>
    <div class="relative bg-white dark:bg-gray-900 w-64 h-full flex flex-col shadow-xl">
        <div class="flex items-center justify-between px-4 h-12 border-b border-gray-200 dark:border-gray-700 shrink-0">
            <span class="font-semibold text-gray-900 dark:text-gray-100">{{.AppName}}</span>
            <a href="#" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 text-xl leading-none">&times;</a>
        </div>
        <nav class="flex flex-col px-4 py-4 gap-1 grow">
            <a href="/domains" class="drawer-link border-b border-gray-100 dark:border-gray-800">Domains</a>
            <a href="/registrars" class="drawer-link border-b border-gray-100 dark:border-gray-800">Registrars</a>
            <a href="/notifications" class="drawer-link border-b border-gray-100 dark:border-gray-800">
                Notifications{{if .UnreadCount}} <span class="inline-block bg-red-500 text-white text-xs rounded-full px-1.5 py-0.5 leading-none ml-0.5">{{.UnreadCount}}</span>{{end}}
            </a>
        </nav>
        <div class="flex flex-col px-4 py-4 gap-1 border-t border-gray-200 dark:border-gray-700 shrink-0">
            <a href="/profile" class="drawer-link">{{.User.Username}}</a>
            <form method="POST" action="/logout">
                <button type="submit" class="drawer-link">Logout</button>
            </form>
        </div>
    </div>
</div>
{{end}}
