{{define "title"}}Register — Domain Manager{{end}}
{{define "content"}}
<div class="max-w-sm mx-auto mt-16">
    <h1 class="text-2xl font-semibold mb-6">Create account</h1>
    <form method="POST" action="/register" class="space-y-4">
        <div>
            <label class="block text-sm font-medium mb-1" for="username">Username</label>
            <input type="text" id="username" name="username" required autofocus
                class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-gray-500">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1" for="email">Email</label>
            <input type="email" id="email" name="email" required
                class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-gray-500">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1" for="password">Password</label>
            <input type="password" id="password" name="password" required
                class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-gray-500">
        </div>
        <button type="submit"
            class="w-full bg-gray-900 text-white rounded px-3 py-2 text-sm hover:bg-gray-700">
            Create account
        </button>
    </form>
    <p class="text-sm text-gray-500 mt-4 text-center">
        Already have an account? <a href="/login" class="text-gray-900 underline">Sign in</a>
    </p>
</div>
{{end}}
