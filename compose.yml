services:
  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      APP_SECRET: change-me-to-a-random-secret
      DB_DRIVER: sqlite
      DB_DSN: data/domaindex.db
      WHOIS_REFRESH_INTERVAL: 6h
      REGISTRATION_ENABLED: "true"
      # APPRISE_URL: http://apprise:8000
      # APPRISE_KEY: ""
      # APPRISE_TAG: all
    restart: unless-stopped

  # Optional: Apprise notification gateway
  # apprise:
  #   image: caronc/apprise:latest
  #   ports:
  #     - "8001:8000"
  #   volumes:
  #     - ./apprise-config:/config
  #   restart: unless-stopped
